<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>THE LUX - AUTOHAUS SYSTEM</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e2a47, #0f172a);
    color: white;
    margin: 0;
    padding: 40px;
}

/* Layout */
.container {
    display: flex;
    justify-content: center;
    gap: 50px;
    flex-wrap: wrap;
}

/* Karten */
.card {
    background: rgba(20, 20, 30, 0.85);
    padding: 30px;
    border-radius: 15px;
    width: 400px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* Titel */
.card h2 {
    text-align: center;
    margin-bottom: 20px;
    font-size: 26px;
}

/* Inputs */
input {
    width: 100%;
    padding: 15px;
    margin: 12px 0;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    background: #2a2a3d;
    color: white;
}

/* Buttons */
button {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    background: #3a6df0;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #2756b5;
}

/* Rabatt */
.discount-wrap {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.btn-discount {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    background: #333;
    color: white;
    border: none;
    cursor: pointer;
}

.btn-discount.active {
    background: #3a6df0;
}

/* Anzeige */
.result {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

    <!-- ANKAUF -->
    <div class="card">
        <h2>🚗 Ankauf</h2>
        <input id="a_auto" placeholder="Auto Name">
        <input id="a_preis" type="number" placeholder="Preis (€)">
        <input id="a_vor" placeholder="Vorbesitzer">
        <input id="a_mit" placeholder="Mitarbeiter">
        <button onclick="ankauf()">Speichern</button>
    </div>

    <!-- VERKAUF -->
    <div class="card">
        <h2>💰 Verkauf</h2>
        <input id="v_auto" placeholder="Auto Name">
        <input id="v_preis" type="number" placeholder="Preis (€)" oninput="calcSale()">
        <input id="v_vor" placeholder="Vorbesitzer">
        <input id="v_mit" placeholder="Mitarbeiter">

        <div class="discount-wrap">
            <button class="btn-discount active" onclick="setDiscount(0,this)">0%</button>
            <button class="btn-discount" onclick="setDiscount(25,this)">25%</button>
            <button class="btn-discount" onclick="setDiscount(50,this)">50%</button>
            <button class="btn-discount" onclick="setDiscount(75,this)">75%</button>
            <button class="btn-discount" onclick="setDiscount(100,this)">100%</button>
        </div>

        <div class="result" id="endpreis">Endpreis: 0€</div>

        <button onclick="verkauf()">Speichern</button>
    </div>

</div>

<!-- REPARATUR -->
<div class="container">
    <div class="card">
        <h2>🔧 Reparatur</h2>
        <input id="r_anzahl" type="number" placeholder="Anzahl" oninput="calcRepair()">
        <input id="r_mit" placeholder="Mitarbeiter">

        <div class="discount-wrap">
            <button class="btn-discount active" onclick="setRepairDiscount(0,this)">0%</button>
            <button class="btn-discount" onclick="setRepairDiscount(25,this)">25%</button>
            <button class="btn-discount" onclick="setRepairDiscount(50,this)">50%</button>
            <button class="btn-discount" onclick="setRepairDiscount(75,this)">75%</button>
            <button class="btn-discount" onclick="setRepairDiscount(100,this)">100%</button>
        </div>

        <div class="result" id="r_preis">Preis: 0€</div>

        <button onclick="calcRepair()">Berechnen</button>
    </div>
</div>

<script>
let discount = 0;
let repairDiscount = 0;

/* ANKAUF */
function ankauf() {
    let auto = a_auto.value;
    let preis = a_preis.value;
    let vor = a_vor.value;
    let mit = a_mit.value;

    if (!auto || !preis || !vor || !mit) {
        alert("Bitte alles ausfüllen!");
        return;
    }

    alert(`Ankauf: ${auto} für ${preis}€ gespeichert`);
}

/* VERKAUF */
function setDiscount(val, btn) {
    discount = val;
    document.querySelectorAll('.btn-discount').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    calcSale();
}

function calcSale() {
    let preis = parseFloat(v_preis.value) || 0;
    let end = preis - (preis * discount / 100);
    endpreis.innerText = `Endpreis: ${end}€`;
}

function verkauf() {
    let auto = v_auto.value;
    let preis = parseFloat(v_preis.value);
    let vor = v_vor.value;
    let mit = v_mit.value;

    if (!auto || !preis || !vor || !mit) {
        alert("Bitte alles ausfüllen!");
        return;
    }

    let end = preis - (preis * discount / 100);
    alert(`Verkauf: ${auto} für ${end}€ gespeichert`);
}

/* REPARATUR */
function setRepairDiscount(val, btn) {
    repairDiscount = val;
    btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    calcRepair();
}

function calcRepair() {
    let anzahl = parseInt(r_anzahl.value) || 0;
    let preis = anzahl * 4000;
    let end = preis - (preis * repairDiscount / 100);
    r_preis.innerText = `Preis: ${end}€`;
}
</script>

</body>
</html>
