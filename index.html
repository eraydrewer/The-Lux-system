<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>AUTOHAUS - AUTOHAUS SYSTEM</title>

<style>
body {
    font-family: 'Arial', sans-serif;
    margin: 0;
    background: radial-gradient(circle at top, #1e2a47, #0b1020);
    color: #fff;
}

.header {
    width: 100%;
    padding: 25px;
    text-align: center;
    font-size: 34px;
    font-weight: 800;
    letter-spacing: 3px;
    font-family: 'Orbitron', sans-serif;
    text-transform: uppercase;

    background: linear-gradient(90deg, #3a6df0, #274bb5, #3a6df0);
    background-size: 200% 200%;
    animation: glowMove 6s ease infinite;

    color: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    text-shadow: 0 0 10px rgba(58,109,240,0.8);
}
  @keyframes glowMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}  

.login-screen {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.login-box {
    background: rgba(25, 25, 40, 0.95);
    padding: 45px;
    border-radius: 18px;
    width: 320px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
}

.login-box input {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    background: #1f2438;
    color: white;
}

.app {
    display: none;
}

.main {
    padding: 50px;
}

.container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 35px;
    max-width: 1400px;
    margin: auto;
}

@media (max-width: 1100px) {
    .container { grid-template-columns: 1fr 1fr; }
}

@media (max-width: 700px) {
    .container { grid-template-columns: 1fr; }
}

.card {
    background: rgba(25, 25, 40, 0.7);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 30px;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    backdrop-filter: blur(12px);
    transition: 0.2s;
    min-height: 540px;
    display: flex;
    flex-direction: column;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 45px rgba(0,0,0,0.7);
}

.card h2 {
    text-align: center;
    margin-bottom: 20px;
    font-size: 22px;
}

input {
    width: 100%;
    padding: 14px;
    margin: 12px 0;
    border-radius: 10px;
    border: none;
    background: #1f2438;
    color: white;
}

button {
    width: 100%;
    padding: 15px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #3a6df0, #274bb5);
    color: white;
    cursor: pointer;
    font-weight: bold;
    margin-top: auto;
}

.discount-wrap {
    display: flex;
    gap: 8px;
    margin-top: 12px;
}

.btn-discount {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    background: #1a1f33;
    border: 1px solid rgba(255,255,255,0.05);
    cursor: pointer;
}

.btn-discount.active {
    background: #3a6df0;
}

.result {
    text-align: center;
    font-weight: bold;
    margin-top: 18px;
    font-size: 18px;
    color: #dbe6ff;
}
</style>
</head>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
<body>

<div class="login-screen" id="login">
    <div class="login-box">
        <h2>Login</h2>
        <input id="user" placeholder="Benutzername">
        <input id="pass" type="password" placeholder="Passwort">
        <button onclick="loginUser()">Einloggen</button>
    </div>
</div>

<div class="app" id="app">

<div class="header">🚗 Autohaus</div>

<div class="main">
<div class="container">

<!-- ANKAUF -->
<div class="card">
<h2>🚗 Ankauf</h2>
<input id="a_auto" placeholder="Auto Name">
<input id="a_chip" placeholder="Chip">
<input id="a_preis" type="number" placeholder="Preis (€)">
<input id="a_vor" placeholder="Vorbesitzer">
<input id="a_mit" placeholder="Mitarbeiter">
<button onclick="ankauf()">Quittung erstellen</button>
</div>

<!-- VERKAUF -->
<div class="card">
<h2>💰 Verkauf</h2>
<input id="v_auto" placeholder="Auto Name">
<input id="v_preis" type="number" placeholder="Preis (€)" oninput="calcSale()">
<input id="v_vor" placeholder="Vorbesitzer">
<input id="v_mit" placeholder="Mitarbeiter">

<div class="discount-wrap">
<button class="btn-discount active" onclick="setDiscount(0,this)">0%</button>
<button class="btn-discount" onclick="setDiscount(25,this)">25%</button>
<button class="btn-discount" onclick="setDiscount(50,this)">50%</button>
<button class="btn-discount" onclick="setDiscount(75,this)">75%</button>
<button class="btn-discount" onclick="setDiscount(100,this)">100%</button>
</div>

<div class="result" id="endpreis">Preis: 0€</div>
<button onclick="verkauf()">Speichern</button>
</div>

<!-- REPARATUR -->
<div class="card">
<h2>🔧 Reparaturkasten</h2>
<input id="r_anzahl" type="number" placeholder="Anzahl" oninput="calcRepair()">
<input id="r_mit" placeholder="Mitarbeiter">

<div class="discount-wrap">
<button class="btn-discount active" onclick="setRepairDiscount(0,this)">0%</button>
<button class="btn-discount" onclick="setRepairDiscount(25,this)">25%</button>
<button class="btn-discount" onclick="setRepairDiscount(50,this)">50%</button>
<button class="btn-discount" onclick="setRepairDiscount(75,this)">75%</button>
<button class="btn-discount" onclick="setRepairDiscount(100,this)">100%</button>
</div>

<div class="result" id="r_preis">Preis: 0€</div>
<button onclick="repairQuittung()">Quittung erstellen</button>
</div>

</div>
</div>
</div>

<script>
const ANKAUF_WEBHOOK = "https://discord.com/api/webhooks/1494651776580976702/sb9EyQkeB2uaF-z49PeZOmAKEdYBDgz35_a6rytH1VJsClvUhRxp5qSztwdtOBcHFohe";
const VERKAUF_WEBHOOK = "https://discord.com/api/webhooks/1494652790083948665/9a3lOK0zwytNryDWan4PF6lczbIRJFCTAPh8DKO7q42rE8uCmyLPs-EIoNlryLZTcvfW";
const REPARATUR_WEBHOOK = "https://discord.com/api/webhooks/1494652894987817112/EWSxRK8PCVnHhgarD7emVplEqHVod7sX14Kg-C9TCgH7uIxl0rlQCADMLCIioVUQ2edt";
function loginUser() {
    const u = document.getElementById("user").value;
    const p = document.getElementById("pass").value;

    if (u === "Mitarbeiter" && p === "Staff2026") {
        document.getElementById("login").style.display = "none";
        document.getElementById("app").style.display = "block";
    } else {
        alert("Falsche Daten!");
    }
}

function formatEuro(num){
    return num.toLocaleString('de-DE') + "€";
}

let discount = 0;
let repairDiscount = 0;

function ankauf() {
    const auto = document.getElementById("a_auto").value;
    const preis = document.getElementById("a_preis").value;
    const vor = document.getElementById("a_vor").value;
    const mit = document.getElementById("a_mit").value;

    if (!auto || !preis || !vor || !mit) {
        alert("Bitte alles ausfüllen!");
        return;
    }

    sendToDiscord(ANKAUF_WEBHOOK, "🚗 AUTO QUITTUNG", [
        { name: "Auto", value: auto, inline: false },
        { name: "Preis", value: preis + "€", inline: false },
        { name: "Vorbesitzer", value: vor, inline: false },
        { name: "Mitarbeiter", value: mit, inline: false }
    ], 3447003);

    alert("Ankauf gesendet!");
}

function setDiscount(val, btn) {
    discount = val;
    document.querySelectorAll('.discount-wrap')[0]
        .querySelectorAll('button')
        .forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    calcSale();
}

function calcSale() {
    let preis = parseFloat(v_preis.value) || 0;
    let end = preis - (preis * discount / 100);
    endpreis.innerText = "Preis: " + formatEuro(end);
}

function verkauf() {
    const auto = document.getElementById("v_auto").value;
    const preis = document.getElementById("v_preis").value;
    const vor = document.getElementById("v_vor").value;
    const mit = document.getElementById("v_mit").value;

    if (!auto || !preis || !vor || !mit) {
        alert("Bitte alles ausfüllen!");
        return;
    }

    sendToDiscord(VERKAUF_WEBHOOK, "💰 VERKAUF QUITTUNG", [
        { name: "Auto", value: auto, inline: false },
        { name: "Preis", value: preis + "€", inline: false },
        { name: "Vorbesitzer", value: vor, inline: false },
        { name: "Mitarbeiter", value: mit, inline: false }
    ], 5763719);

    alert("Verkauf gesendet!");
}

function setRepairDiscount(val, btn) {
    repairDiscount = val;
    document.querySelectorAll('.discount-wrap')[1]
        .querySelectorAll('button')
        .forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    calcRepair();
}

function calcRepair() {
    let preis = (parseInt(r_anzahl.value) || 0) * 4000;
    let end = preis - (preis * repairDiscount / 100);
    r_preis.innerText = "Preis: " + formatEuro(end);
}
    function repairQuittung() {
    const anzahl = parseInt(document.getElementById("r_anzahl").value) || 0;
    const mit = document.getElementById("r_mit").value;

    if (!anzahl || !mit) {
        alert("Bitte alles ausfüllen!");
        return;
    }

    const preis = anzahl * 4000;
    const end = preis - (preis * repairDiscount / 100);

    sendToDiscord(REPARATUR_WEBHOOK, "🔧 REPARATUR QUITTUNG", [
        { name: "Anzahl", value: String(anzahl), inline: false },
        { name: "Preis", value: end + "€", inline: false },
        { name: "Mitarbeiter", value: mit, inline: false }
    ], 15548997);

    alert("Reparatur gesendet!");
}
function sendToDiscord(webhook, title, fields, color = 3447003) {
    fetch(webhook, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            embeds: [{
                title: title,
                color: color,
                fields: fields
            }]
        })
    });
}
</script>

</body>
</html>
