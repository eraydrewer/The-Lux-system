<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>THE LUX - AUTOHAUS SYSTEM</title>
<style>
/* Hintergrundfarbe: Angenehmes Dunkelblau */
body {
    font-family: Arial, sans-serif;
    background-color: #1e2a47; /* Dunkelblau */
    color: white;
    padding: 20px;
    margin: 0;
    overflow-y: scroll; /* Aktiviert Scrollen */
}

/* Karte für Formulare */
.card {
    background: rgba(18, 18, 24, 0.7);
    padding: 20px;
    margin-bottom: 30px;
    border-radius: 10px;
    max-width: 500px;
    margin: 20px auto;
}

/* Eingabefelder und Buttons */
input, button {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #333;
    font-size: 16px;
}

/* Buttons */
button {
    background-color: #3a6df0;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background-color: #2756b5;
}

/* Rabattbuttons */
.discount-wrap {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.btn-discount {
    flex: 1;
    padding: 12px;
    background-color: #333;
    color: white;
    border: 1px solid #444;
    border-radius: 8px;
}

.btn-discount.active {
    background-color: #3a6df0;
}

/* Preisangaben */
#endpreis, #rep-preis {
    font-weight: bold;
    margin-top: 10px;
    font-size: 18px;
}

/* Kartenüberschriften */
.card h2 {
    text-align: center;
    font-size: 24px;
    margin-bottom: 15px;
}
</style>
</head>

<body>

<!-- ANKAUF -->
<div class="card">
    <h2>🚗 Ankauf</h2>
    <input id="ankauf-auto" placeholder="Auto Name" type="text">
    <input id="ankauf-preis" placeholder="Preis (€)" type="number">
    <input id="ankauf-vorbesitzer" placeholder="Vorbesitzer" type="text">
    <input id="ankauf-mitarbeiter" placeholder="Mitarbeiter" type="text">
    <button onclick="ankauf()">Ankauf speichern</button>
</div>

<!-- VERKAUF -->
<div class="card">
    <h2>💰 Verkauf</h2>
    <input id="verkauf-auto" placeholder="Auto Name" type="text">
    <input id="verkauf-preis" placeholder="Preis (€)" type="number">
    <input id="verkauf-vorbesitzer" placeholder="Vorbesitzer" type="text">
    <input id="verkauf-mitarbeiter" placeholder="Mitarbeiter" type="text">

    <div class="discount-wrap" id="sale-discount">
        <button class="btn-discount active" onclick="setSaleDiscount(0,this)">0%</button>
        <button class="btn-discount" onclick="setSaleDiscount(25,this)">25%</button>
        <button class="btn-discount" onclick="setSaleDiscount(50,this)">50%</button>
        <button class="btn-discount" onclick="setSaleDiscount(75,this)">75%</button>
        <button class="btn-discount" onclick="setSaleDiscount(100,this)">100%</button>
    </div>

    <div id="endpreis">Endpreis: 0€</div>

    <button onclick="verkauf()">Verkauf speichern</button>
</div>

<!-- REPARATUR -->
<div class="card">
    <h2>🔧 Reparaturkasten</h2>
    <input id="rep-anzahl" placeholder="Anzahl" type="number">
    <input id="rep-mitarbeiter" placeholder="Mitarbeiter" type="text">

    <div class="discount-wrap" id="rep-discount">
        <button class="btn-discount active" onclick="setRepDiscount(0,this)">0%</button>
        <button class="btn-discount" onclick="setRepDiscount(25,this)">25%</button>
        <button class="btn-discount" onclick="setRepDiscount(50,this)">50%</button>
        <button class="btn-discount" onclick="setRepDiscount(75,this)">75%</button>
        <button class="btn-discount" onclick="setRepDiscount(100,this)">100%</button>
    </div>

    <div id="rep-preis">Preis: 0€</div>

    <button onclick="repCalc()">Berechnen</button>
</div>

<script>
let saleDiscount = 0;
let repDiscount = 0;

// ANKAUF
function ankauf() {
    const auto = document.getElementById('ankauf-auto').value;
    const preis = document.getElementById('ankauf-preis').value;
    const vor = document.getElementById('ankauf-vorbesitzer').value;
    const mit = document.getElementById('ankauf-mitarbeiter').value;

    if (!auto || !preis || !vor || !mit) {
        alert("Alle Felder ausfüllen!");
        return;
    }

    alert(`Ankauf gespeichert: ${auto} für ${preis}€`);
}

// VERKAUF
function setSaleDiscount(val, btn) {
    saleDiscount = val;
    document.querySelectorAll('#sale-discount .btn-discount')
    .forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    calcSale();
}

function calcSale() {
    const preis = parseFloat(document.getElementById('verkauf-preis').value) || 0;
    const rabatt = preis * (saleDiscount / 100);
    const endpreis = preis - rabatt;

    document.getElementById('endpreis').innerText = `Endpreis: ${endpreis}€`;
}

function verkauf() {
    const auto = document.getElementById('verkauf-auto').value;
    const preis = parseFloat(document.getElementById('verkauf-preis').value);
    const vor = document.getElementById('verkauf-vorbesitzer').value;
    const mit = document.getElementById('verkauf-mitarbeiter').value;

    if (!auto || !preis || !vor || !mit) {
        alert("Alle Felder ausfüllen!");
        return;
    }

    const endpreis = preis - (preis * saleDiscount / 100);

    alert(`Verkauf gespeichert: ${auto} für ${endpreis}€`);
}

// REPARATUR
function setRepDiscount(val, btn) {
    repDiscount = val;
    document.querySelectorAll('#rep-discount .btn-discount')
    .forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    repCalc();
}

function repCalc() {
    const anzahl = parseInt(document.getElementById('rep-anzahl').value) || 0;
    const preis = anzahl * 4000;
    const rabatt = preis * (repDiscount / 100);
    const endpreis = preis - rabatt;

    document.getElementById('rep-preis').innerText = `Preis: ${endpreis}€`;
}
</script>

</body>
</html>
