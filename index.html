<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>THE LUX - AUTOHAUS SYSTEM</title>

<style>
body {
    font-family: 'Arial', sans-serif;
    margin: 0;
    background: radial-gradient(circle at top, #1e2a47, #0b1020);
    color: #fff;
}

/* HEADER */
.header {
    width: 100%;
    padding: 22px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 1px;
    background: rgba(15, 15, 25, 0.9);
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
}

/* LOGIN */
.login-screen {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.login-box {
    background: rgba(25, 25, 40, 0.95);
    padding: 45px;
    border-radius: 18px;
    width: 320px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
}

.login-box input {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    background: #1f2438;
    color: white;
}

/* APP */
.app { display: none; }

/* MAIN */
.main { padding: 50px; }

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 35px;
    max-width: 1400px;
    margin: auto;
}

/* RESPONSIVE */
@media (max-width: 1100px) {
    .container { grid-template-columns: 1fr 1fr; }
}

@media (max-width: 700px) {
    .container { grid-template-columns: 1fr; }
}

/* CARDS (GLASS EFFECT) */
.card {
    background: rgba(25, 25, 40, 0.7);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 30px;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    backdrop-filter: blur(12px);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    min-height: 540px;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 45px rgba(0,0,0,0.7);
}

/* TITEL */
.card h2 {
    text-align: center;
    margin-bottom: 20px;
    font-size: 22px;
    letter-spacing: 0.5px;
}

/* INPUTS */
input {
    width: 100%;
    padding: 14px;
    margin: 12px 0;
    border-radius: 10px;
    border: none;
    background: #1f2438;
    color: white;
    outline: none;
    transition: 0.2s;
}

input:focus {
    background: #2a3150;
    box-shadow: 0 0 10px rgba(58,109,240,0.4);
}

/* BUTTONS */
button {
    width: 100%;
    padding: 15px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #3a6df0, #274bb5);
    color: white;
    cursor: pointer;
    font-weight: bold;
    margin-top: auto;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.02);
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
}

/* DISCOUNTS */
.discount-wrap {
    display: flex;
    gap: 8px;
    margin-top: 12px;
}

.btn-discount {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    background: #1a1f33;
    border: 1px solid rgba(255,255,255,0.05);
    cursor: pointer;
    transition: 0.2s;
}

.btn-discount:hover {
    background: #2a3150;
}

.btn-discount.active {
    background: #3a6df0;
    box-shadow: 0 0 12px rgba(58,109,240,0.4);
}

/* RESULT */
.result {
    text-align: center;
    font-weight: bold;
    margin-top: 18px;
    font-size: 18px;
    color: #dbe6ff;
}
</style>
</head>

<body>

<div class="login-screen" id="login">
    <div class="login-box">
        <h2>Login</h2>
        <input id="user" placeholder="Benutzername">
        <input id="pass" type="password" placeholder="Passwort">
        <button onclick="loginUser()">Einloggen</button>
    </div>
</div>

<div class="app" id="app">

<div class="header">🚗 Autohaus</div>

<div class="main">
<div class="container">

    <!-- ANKAUF -->
    <div class="card">
        <h2>🚗 Ankauf</h2>
        <input id="a_auto" placeholder="Auto Name">
        <input id="a_chip" placeholder="Chip"> <!-- 🔥 NEU -->
        <input id="a_preis" type="number" placeholder="Preis (€)">
        <input id="a_vor" placeholder="Vorbesitzer">
        <input id="a_mit" placeholder="Mitarbeiter">
        <button onclick="ankauf()">Quittung erstellen</button>
    </div>

    <!-- VERKAUF -->
    <div class="card">
        <h2>💰 Verkauf</h2>
        <input id="v_auto" placeholder="Auto Name">
        <input id="v_preis" type="number" placeholder="Preis (€)" oninput="calcSale()">
        <input id="v_vor" placeholder="Vorbesitzer">
        <input id="v_mit" placeholder="Mitarbeiter">

        <div class="discount-wrap">
            <button class="btn-discount active" onclick="setDiscount(0,this)">0%</button>
            <button class="btn-discount" onclick="setDiscount(25,this)">25%</button>
            <button class="btn-discount" onclick="setDiscount(50,this)">50%</button>
            <button class="btn-discount" onclick="setDiscount(75,this)">75%</button>
            <button class="btn-discount" onclick="setDiscount(100,this)">100%</button>
        </div>

        <div class="result" id="endpreis">Preis: 0€</div>

        <button onclick="verkauf()">Speichern</button>
    </div>

    <!-- REPARATURKASTEN -->
    <div class="card">
        <h2>🔧 Reparaturkasten</h2>
        <input id="r_anzahl" type="number" placeholder="Anzahl" oninput="calcRepair()">
        <input id="r_mit" placeholder="Mitarbeiter">

        <div class="discount-wrap">
            <button class="btn-discount active" onclick="setRepairDiscount(0,this)">0%</button>
            <button class="btn-discount" onclick="setRepairDiscount(25,this)">25%</button>
            <button class="btn-discount" onclick="setRepairDiscount(50,this)">50%</button>
            <button class="btn-discount" onclick="setRepairDiscount(75,this)">75%</button>
            <button class="btn-discount" onclick="setRepairDiscount(100,this)">100%</button>
        </div>

        <div class="result" id="r_preis">Preis: 0€</div>

        <button onclick="calcRepair()">Quittung erstellen</button>
    </div>

</div>
</div>

</div>

<script>
function loginUser() {
    const u = document.getElementById("user").value;
    const p = document.getElementById("pass").value;

    if (u === "Mitarbeiter" && p === "Staff2026") {
        document.getElementById("login").style.display = "none";
        document.getElementById("app").style.display = "block";
    } else {
        alert("Falsche Daten!");
    }
}

/* 🔥 ZAHL FORMATIERUNG */
function formatEuro(num){
    return num.toLocaleString('de-DE') + "€";
}

let discount = 0;
let repairDiscount = 0;

function ankauf() {
    if (!a_auto.value || !a_preis.value || !a_vor.value || !a_mit.value) {
        alert("Bitte alles ausfüllen!");
        return;
    }
    alert(`Ankauf: ${a_auto.value} gespeichert`);
}

function setDiscount(val, btn) {
    discount = val;
    document.querySelectorAll('.discount-wrap')[0]
        .querySelectorAll('button')
        .forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    calcSale();
}

function calcSale() {
    let preis = parseFloat(v_preis.value) || 0;
    let end = preis - (preis * discount / 100);
    endpreis.innerText = "Endpreis: " + formatEuro(end);
}

function verkauf() {
    if (!v_auto.value || !v_preis.value || !v_vor.value || !v_mit.value) {
        alert("Bitte alles ausfüllen!");
        return;
    }
    alert(`Verkauf gespeichert`);
}

function setRepairDiscount(val, btn) {
    repairDiscount = val;
    document.querySelectorAll('.discount-wrap')[1]
        .querySelectorAll('button')
        .forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    calcRepair();
}

function calcRepair() {
    let preis = (parseInt(r_anzahl.value) || 0) * 4000;
    let end = preis - (preis * repairDiscount / 100);
    r_preis.innerText = "Preis: " + formatEuro(end);
}
</script>

</body>
</html>
